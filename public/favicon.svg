<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#05050f"/>
  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <!-- Gaussian splat simulation: concentric soft circles -->
  <circle cx="50" cy="50" r="35" fill="#7c3aed" opacity="0.06"/>
  <circle cx="50" cy="50" r="24" fill="#7c3aed" opacity="0.12"/>
  <circle cx="50" cy="50" r="16" fill="#7c3aed" opacity="0.22"/>
  <circle cx="50" cy="50" r="10" fill="#7c3aed" opacity="0.45"/>
  <!-- Accent sparks -->
  <circle cx="34" cy="36" r="2.5" fill="#f5c518" opacity="0.7"/>
  <circle cx="68" cy="38" r="1.8" fill="#06b6d4" opacity="0.7"/>
  <circle cx="62" cy="66" r="2"   fill="#a78bfa" opacity="0.6"/>
  <circle cx="38" cy="64" r="1.5" fill="#f5c518" opacity="0.5"/>
  <!-- Telugu glyph "దృ" -->
  <text
    x="50" y="58"
    text-anchor="middle"
    font-family="'Noto Sans Telugu', serif"
    font-size="26"
    font-weight="700"
    fill="white"
    opacity="0.95"
  >దృ</text>
</svg>
